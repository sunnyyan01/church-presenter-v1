<div class="dialog-inner" [class.hidden]="!open()">
    <h1>{{friendlyFolderName()}}</h1>
    <div class="toolbar">
        <div class="button icon-button" (click)="changeSas()">
            <img src="icons/key.svg">
            <div class="status-dot" [style.backgroundColor]="sasColour()"></div>
        </div>
        <div class="button icon-button" (click)="refresh()">
            <img src="icons/refresh.svg">
        </div>
    </div>
    <div class="files">
        @for (file of files(); track file) {
            <div
                class="file"
                [class.selected]="file === selected()"
                (click)="selected.set(file)"
                (dblclick)="selected.set(file); onClose()"
            >
                {{file}}
            </div>
        }
    </div>
    <input
        type="text"
        [(value)]="selected"
        (blur)="selected.set($any($event.target).value)"
    />
    <div class="buttons">
        <div class="button text-button primary" (click)="onClose()">
            {{action()}}
        </div>
        <div class="button text-button secondary" (click)="onCancel()">
            Cancel
        </div>
    </div>
</div>
